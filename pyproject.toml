[tool.pytest.ini_options]
pythonpath = "."
addopts = "-q"
asyncio_mode = "auto"

[tool.ruff]
line-length = 79
target-version = "py310"
exclude = ["*.md", "TODO_UPDATE_PROCESS.md", "PROJECT_TODO.md", "TODO.md"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.ruff.lint.isort]
known-first-party = ["app", "bmi_core", "providers"]
known-third-party = ["hypothesis"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["E402", "F401", "F811"]
"tests_strict/**/*.py" = ["E402", "F401", "F811"]
"app.py" = ["E701", "E402"]
"bmi_core.py" = ["E701"]